[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/i3]
width = 100%
height = 24pt
radius = 8

; dpi = 8

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 0

#separator = |
separator-foreground = ${colors.disabled}

#font 
font-2 = "Hack:style=Regular:pixelsize=12;2"
font-1 = "Font Awesome 6 Free:style=Solid:pixelsize=12"
font-0 = "Noto Sans Symbols:size=12;2"

modules-left = xworkspaces spacer  power
modules-right = bbb brightness spacer  pulseaudio spacer  xkeyboard spacer  memory spacer  cpu spacer time
modules-center = 
#cursor-click = pointer
#cursor-scroll = ns-resize

enable-ipc = true

 tray-position = center

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/time]
type = custom/script
exec = ~/.config/polybar/time.sh
tail = true
click-left = cat /tmp/polybar_date_ar.txt | xargs notify-send "Ш§Щ„ШӘШ§ШұЩҠШ® Ш§Щ„ЩҠЩҲЩ…"

[module/power]
type = custom/script
exec = echo "#"
click-left = ~/.config/rofi/menue-power.sh
label = %output%



[module/spacer]
type = custom/text
content = " | "

[module/bbb]
type = custom/text
content = "Light "
label = %content%
label-foreground = #F0C674

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/brightness]
type = custom/script
exec = ~/.config/polybar/brightness.sh
interval = 5
click-left = brightnessctl set 5%-
click-right = brightnessctl set +5%
scroll-up = brightnessctl set +1%
scroll-down = brightnessctl set 1%-


[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
format-prefix-foreground = ${colors.primary}
format = <label-layout>
label-layout = %layout%
label-layout-padding = 2


[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}



[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
